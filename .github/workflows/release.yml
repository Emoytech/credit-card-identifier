name: Build Release Binary

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Compile
        run: gcc -o credit-linux credit.c

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: credit-linux
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
